<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ASL Napoli 3 Sud — Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/header.jsx"></script>
<script type="text/babel" src="src/hero.jsx"></script>
<script type="text/babel" src="src/services.jsx"></script>
<script type="text/babel" src="src/waiting.jsx"></script>
<script type="text/babel" src="src/screening.jsx"></script>
<script type="text/babel" src="src/news.jsx"></script>
<script type="text/babel" src="src/footer.jsx"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="src/mobile.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "primary": "teal",
  "hero": "search",
  "density": "regular"
}/*EDITMODE-END*/;

const primaryMap = {
  blu:      { primary: "#0066CC", primary800: "#004080", primary100: "#D2E6F9", primary050: "#EDF4FC" },
  teal:     { primary: "#00798C", primary800: "#00606E", primary100: "#CCE4E8", primary050: "#E6F2F4" },
  campania: { primary: "#003D82", primary800: "#002957", primary100: "#C9D7EA", primary050: "#E8EEF7" },
  magenta:  { primary: "#A31A57", primary800: "#7A1240", primary100: "#F0CFDD", primary050: "#F9E8EE" },
};

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try {
      const s = localStorage.getItem("asl-tweaks");
      return s ? { ...TWEAK_DEFAULTS, ...JSON.parse(s) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [editMode, setEditMode] = React.useState(false);

  // Apply tweaks
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
    const p = primaryMap[tweaks.primary] || primaryMap.blu;
    document.documentElement.style.setProperty("--bi-primary", p.primary);
    document.documentElement.style.setProperty("--bi-primary-800", p.primary800);
    document.documentElement.style.setProperty("--bi-primary-100", p.primary100);
    document.documentElement.style.setProperty("--bi-primary-050", p.primary050);
    try { localStorage.setItem("asl-tweaks", JSON.stringify(tweaks)); } catch {}
  }, [tweaks]);

  // Edit mode handshake
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode") setEditMode(true);
      if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const update = (patch) => {
    setTweaks(t => {
      const next = { ...t, ...patch };
      try {
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
      } catch {}
      return next;
    });
  };

  const toggleTheme = () => update({ theme: tweaks.theme === "dark" ? "light" : "dark" });

  const HeroVariant =
    tweaks.hero === "actions"  ? HeroActions :
    tweaks.hero === "campaign" ? HeroCampaign :
    Hero;

  return (
    <div data-screen-label="01 Homepage desktop" style={{ background: "var(--bi-bg)" }}>
      <TopBar />
      <BrandRow onToggleTheme={toggleTheme} theme={tweaks.theme} />
      <MainNav />
      <AlertBar />
      <HeroVariant />
      <ServicesGrid />
      <WaitingLists />
      <Screening />
      <CTABand />
      <News />
      <Facilities />
      <MobilePreview />
      <Footer />

      {editMode && (
        <TweaksPanel
          tweaks={tweaks}
          onChange={update}
          onClose={() => {
            setEditMode(false);
            window.parent.postMessage({ type: "__edit_mode_deactivate" }, "*");
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
